<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#0A0A08"/>

  <!-- Subtle cross guides -->
  <line x1="16" y1="5" x2="16" y2="27" stroke="#C8A96E" stroke-width="0.5" opacity="0.35"/>
  <line x1="5" y1="16" x2="27" y2="16" stroke="#C8A96E" stroke-width="0.5" opacity="0.35"/>

  <!-- Outer diamond -->
  <polygon points="16,4 28,16 16,28 4,16" fill="none" stroke="#C8A96E" stroke-width="1.1"/>

  <!-- Inner diamond -->
  <polygon points="16,10 22,16 16,22 10,16" fill="none" stroke="#C8A96E" stroke-width="0.7" opacity="0.6"/>

  <!-- Cardinal tick marks -->
  <line x1="16" y1="4"  x2="16" y2="7"  stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="16" x2="25" y2="16" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="28" x2="16" y2="25" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="4"  y1="16" x2="7"  y2="16" stroke="#C8A96E" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="16" cy="16" r="1.8" fill="#C8A96E"/>
</svg>
